name: Create Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    outputs:
      package_version: ${{ steps.build_details.outputs.package_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/cache
            ~/.dmg-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('**/package.json', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Determine build command and artifact path
        id: build_details
        shell: bash
        run: |
          PRODUCT_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "package_version=${VERSION}" >> $GITHUB_OUTPUT

          OUTPUT_DIR="dist"

          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --win --x64 --ia32 --publish never" >> $GITHUB_OUTPUT
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.exe" >> $GITHUB_OUTPUT
          elif [ "$RUNNER_OS" == "macOS" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --mac --x64 --arm64 --publish never" >> $GITHUB_OUTPUT
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.dmg" >> $GITHUB_OUTPUT
          elif [ "$RUNNER_OS" == "Linux" ]; then
            echo "BUILD_COMMAND=npx electron-vite build && npx electron-builder --linux --x64 --arm64 --publish never" >> $GITHUB_OUTPUT
            echo "ARTIFACT_PATH=${OUTPUT_DIR}/${PRODUCT_NAME}-${VERSION}-*.[Ad]*" >> $GITHUB_OUTPUT
          fi

      - name: Build application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_BUILDER_DOWNLOAD_TIMEOUT: 120000
          npm_config_fetch_timeout: 120000
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 120000
          npm_config_fetch_retries: 5
        timeout-minutes: 30
        shell: bash
        run: |
          for i in 1 2 3; do
            ${{ steps.build_details.outputs.BUILD_COMMAND }} && exit 0
            if [ $i -lt 3 ]; then
              echo "Build attempt $i failed, retrying in 30s..."
              sleep 30
            else
              echo "All 3 build attempts failed. Aborting this OS."
              exit 1
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ matrix.os }}
          path: ${{ steps.build_details.outputs.ARTIFACT_PATH }}
          if-no-files-found: error

  create_release:
    name: Create GitHub Release
    needs: build
    # Run the release job even if some matrix legs failed, as long as the
    # workflow wasn't cancelled. Artifacts from failed OSes simply won't exist
    # and are skipped below.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        shell: bash
        run: |
          echo "Artifacts present:"
          ls -la artifacts || true
          find artifacts -maxdepth 3 -type f | sort || true
          if [ -z "$(find artifacts -type f 2>/dev/null)" ]; then
            echo "::error::No build artifacts were produced by any OS — aborting release."
            exit 1
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.build.outputs.package_version }}
          name: Release v${{ needs.build.outputs.package_version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          # fail_on_unmatched_files defaults to false, so any OS whose build
          # failed will simply be skipped rather than breaking the release.
          fail_on_unmatched_files: false
          files: |
            artifacts/build-artifact-windows-latest/*
            artifacts/build-artifact-macos-latest/*
            artifacts/build-artifact-ubuntu-latest/*
